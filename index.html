<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Anto | Link in Bio</title>
  <meta name="description" content="Link in bio modern untuk personal branding dan jualan" />

  <!-- Open Graph -->
  <meta property="og:title" content="Anto | Link in Bio">
  <meta property="og:description" content="Semua link penting dalam satu halaman">
  <meta property="og:image" content="/assets/avatar.jpg">

  <!-- Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Anto",
    "url": "https://yourdomain.com",
    "sameAs": [
      "https://instagram.com/",
      "https://x.com/",
      "https://linkedin.com/"
    ]
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="manifest" href="/manifest.json">

</head>

<body class="bg-gray-100 flex justify-center">

  <!-- CONTAINER MOBILE -->
  <div class="w-full max-w-md min-h-screen bg-white p-4">

    <!-- PROFILE -->
    <div class="text-center mb-6 animate-fade">
      <img src="/assets/avatar.jpg" loading="lazy"
        class="w-24 h-24 rounded-full mx-auto mb-3 object-cover" />

      <h1 id="name" class="text-xl font-bold"></h1>
      <p id="bio" class="text-sm text-gray-500"></p>
    </div>

    <!-- FEATURED -->
    <div id="featured"></div>

    <!-- LINKS -->
    <div id="links" class="space-y-3 mt-4"></div>

    <!-- PRODUCTS -->
    <div id="products" class="mt-6"></div>

    <!-- GALLERY -->
    <div id="gallery" class="grid grid-cols-3 gap-2 mt-6"></div>

  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-4 w-11/12 max-w-sm relative">

      <button onclick="closeModal()"
        class="absolute top-2 right-2 text-xl">✕</button>

      <img id="modalImg" class="rounded-lg mb-3" />
      <h2 id="modalTitle" class="font-bold"></h2>
      <p id="modalDesc" class="text-sm text-gray-500 mb-3"></p>

      <div class="flex gap-2">
        <a id="modalDemo" class="flex-1 bg-gray-200 text-center py-2 rounded">Demo</a>
        <a id="modalBuy" class="flex-1 bg-black text-white text-center py-2 rounded">Buy</a>
      </div>

    </div>
  </div>

<script src="/script.js"></script>
</body>
</html>

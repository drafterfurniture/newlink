<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>

<link rel="preload" href="/output.css" as="style">
<link rel="stylesheet" href="/output.css">

<style>
body{font-family:-apple-system,BlinkMacSystemFont;margin:0;background:#fff}

/* gradient kuning */
.gradient-anim{
background:linear-gradient(120deg,#fef08a,#fde047,#facc15,#eab308);
background-size:200% 200%;
animation:gradientMove 6s ease infinite;
}
@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* wa */
.wa-btn{
background:linear-gradient(120deg,#fde047,#facc15,#eab308);
background-size:200% 200%;
animation:gradientMove 5s ease infinite;
color:#000;
}

/* donate */
.donate-pill{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:999px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
border:1px solid rgba(0,0,0,0.05);
}

/* modal */
.modal{
transform:translateY(40px) scale(.95);
opacity:0;
transition:.3s ease;
}
.modal.show{
transform:translateY(0) scale(1);
opacity:1;
}
</style>

<script defer src="/assets/lucide.min.js"></script>
<script defer src="/assets/lottie.min.js"></script>
<script src="https://unpkg.com/ethers/dist/ethers.min.js"></script>

</head>

<body>

<main class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="bg-white/90 backdrop-blur border rounded-[26px] p-3">

<div class="relative h-40 rounded-2xl overflow-visible">

<div class="absolute inset-0 rounded-2xl gradient-anim"></div>

<div id="coverBox"
class="absolute inset-0 rounded-2xl overflow-hidden"></div>

<img src="/assets/avatar.jpg"
alt="Foto profil Customin Store"
class="absolute left-4 bottom-0 translate-y-1/2
w-20 h-20 rounded-full border-4 border-white object-cover shadow-lg">

<button onclick="openWeb3()"
class="absolute right-4 bottom-0 translate-y-1/2
flex items-center gap-2 px-4 py-2 donate-pill">
<i data-lucide="heart-handshake"></i>
Donate
</button>

</div>

<div class="h-16"></div>

<h1 class="text-xl font-bold text-center">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- WA -->
<a id="waBtn"
class="wa-btn flex items-center justify-center gap-2 py-3 rounded-full font-semibold shadow">
<i data-lucide="message-circle"></i>
Chat via WhatsApp
</a>

<!-- CONNECT -->
<button onclick="connectWallet()"
class="flex items-center justify-center gap-2 py-3 rounded-full font-semibold border">
<i data-lucide="wallet"></i>
Connect Wallet
</button>

<div id="links" class="space-y-2"></div>
<div id="products" class="flex gap-3 overflow-x-auto py-2"></div>
<div id="linksBottom" class="space-y-2"></div>

</main>

<!-- WEB3 MODAL -->
<div id="web3Modal"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="bg-white rounded-2xl p-4 w-80 relative">

<button onclick="closeWeb3()" class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<h2 class="font-bold text-lg text-center mb-2">Donate Crypto</h2>

<div id="walletInfo" class="text-center text-sm mb-3 text-gray-600">
Not connected
</div>

<p class="text-sm mb-1">Network</p>
<div class="flex gap-2 mb-3">
<button onclick="setChain('ethereum')" class="chainBtn flex-1 border rounded-lg py-2">ETH</button>
<button onclick="setChain('bsc')" class="chainBtn flex-1 border rounded-lg py-2">BSC</button>
<button onclick="setChain('polygon')" class="chainBtn flex-1 border rounded-lg py-2">MATIC</button>
</div>

<p class="text-sm mb-1">Nominal</p>
<div class="flex gap-2 mb-3">
<button onclick="setAmount('0.001')" class="amtBtn flex-1 border rounded-lg py-2">0.001</button>
<button onclick="setAmount('0.005')" class="amtBtn flex-1 border rounded-lg py-2">0.005</button>
<button onclick="setAmount('0.01')" class="amtBtn flex-1 border rounded-lg py-2">0.01</button>
</div>

<input id="customAmount"
placeholder="Custom (0.002)"
class="w-full border rounded-lg p-2 mb-3 text-sm">

<button onclick="submitDonate()"
class="w-full bg-black text-white py-2 rounded-xl">
Send Crypto
</button>

</div>
</div>

<script defer src="/script.js"></script>

<script>
let userAddress=null
let selectedChain="ethereum"
let selectedAmount="0.001"

const RECEIVER="0x76e7191be489b31932b9656fe4a83d82E6Cc9FFC"

let balances={ethereum:0}
let prices={ethereum:0}

function openWeb3(){web3Modal.classList.remove("hidden")}
function closeWeb3(){web3Modal.classList.add("hidden")}

function setChain(c){
selectedChain=c
document.querySelectorAll(".chainBtn").forEach(b=>b.classList.remove("bg-black","text-white"))
event.target.classList.add("bg-black","text-white")
updateWalletUI(c)
}

function setAmount(a){
selectedAmount=a
document.querySelectorAll(".amtBtn").forEach(b=>b.classList.remove("bg-black","text-white"))
event.target.classList.add("bg-black","text-white")
}

// CONNECT
async function connectWallet(){
if(!window.ethereum){alert("Install wallet");return}

const provider=new ethers.providers.Web3Provider(window.ethereum)
await provider.send("eth_requestAccounts",[])
const signer=provider.getSigner()
userAddress=await signer.getAddress()

document.querySelector('[onclick="connectWallet()"]').innerText=userAddress.slice(0,6)+"..."

await fetchPrices()
await loadBalance()
}

// PRICE
async function fetchPrices(){
const res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd")
const data=await res.json()
prices.ethereum=data.ethereum.usd
}

// BALANCE
async function loadBalance(){
const provider=new ethers.providers.Web3Provider(window.ethereum)
const signer=provider.getSigner()
const addr=await signer.getAddress()

const bal=await provider.getBalance(addr)
balances.ethereum=parseFloat(ethers.utils.formatEther(bal))

updateWalletUI("ethereum")
}

// UI
function updateWalletUI(chain){
const bal=balances.ethereum||0
const usd=(bal*(prices.ethereum||0)).toFixed(2)

walletInfo.innerHTML=`
<div class="font-medium">${chain.toUpperCase()}</div>
<div>${bal.toFixed(4)} (~$${usd})</div>
`
}

// SEND
async function submitDonate(){
const custom=document.getElementById("customAmount").value
const amount=custom||selectedAmount

const provider=new ethers.providers.Web3Provider(window.ethereum)
const signer=provider.getSigner()

try{
const tx=await signer.sendTransaction({
to:RECEIVER,
value:ethers.utils.parseEther(amount)
})

closeWeb3()
alert("Processing...")
await tx.wait()
alert("Thanks 🔥")
}catch(e){
alert("Cancelled")
}
}

window.addEventListener("load",()=>{
if(window.lucide) lucide.createIcons()

if(window.lottie){
setTimeout(()=>{
lottie.loadAnimation({
container:document.getElementById("coverBox"),
renderer:"svg",
loop:true,
autoplay:true,
path:"/assets/cover.json"
})
},300)
}
})
</script>

</body>
</html>

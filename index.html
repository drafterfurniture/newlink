<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Anto | Link in Bio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body{font-family:system-ui;background:#f5f5f5}

/* DARK HEADER */
#lottie-cover{
  background: linear-gradient(135deg,#1a1a1a,#2a2a2a);
}

/* HOVER */
.link,.product{transition:.25s}
.link:hover{transform:translateY(-2px)}
.product:hover{transform:translateY(-3px) scale(1.02)}

/* HEART */
.lucide-heart{animation:pulse 1.5s infinite}
@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.2)}
 100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="relative">
  <div class="rounded-[30px] overflow-hidden shadow-lg">
    <div class="relative h-44 w-full">
      <div id="lottie-cover" class="w-full h-full"></div>
      <div class="absolute inset-0 bg-black/30"></div>
    </div>
  </div>

  <div class="absolute left-5 -bottom-8 right-5 flex justify-between items-center">
    
    <!-- Avatar -->
    <div class="w-[78px] h-[78px] rounded-full border-4 border-white bg-white overflow-hidden shadow-md">
      <img src="/assets/profile.jpg" class="w-full h-full object-cover">
    </div>

    <!-- Donate -->
    <button onclick="openDonate()" class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-full shadow text-xs">
      <i data-lucide="heart"></i>
      Donate
    </button>

  </div>
</div>

<div class="h-20"></div>

<!-- NAME -->
<div class="text-center">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 gap-3 mt-6"></div>

<!-- BLOG LIST -->
<div id="blog" class="space-y-3 mt-6"></div>

</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-4 w-[90%] max-w-sm relative">
    <button onclick="closeProduct()" class="absolute top-3 right-3 w-6 h-6 bg-red-500 text-white rounded-full text-xs">✕</button>
    <img id="pImg" class="rounded-lg mb-2">
    <h2 id="pTitle" class="font-bold"></h2>
    <p id="pPrice"></p>
  </div>
</div>

<!-- DONATE MODAL -->
<div id="donateModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-4 w-[90%] max-w-sm relative">
    <button onclick="closeDonate()" class="absolute top-3 right-3 w-6 h-6 bg-red-500 text-white rounded-full text-xs">✕</button>
    <h2 class="text-center font-bold mb-3">Donate</h2>
    <img src="/assets/qris.webp" class="rounded-lg w-full" />
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>

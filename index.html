<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body { font-family: system-ui, sans-serif; }
</style>

</head>

<body class="bg-gray-100 flex justify-center">

<div class="w-full max-w-md min-h-screen p-4">

<!-- ================= HEADER ================= -->
<div class="bg-white p-3 rounded-3xl shadow-sm">

  <!-- SKY BACKGROUND -->
  <div class="relative h-32 rounded-2xl overflow-hidden 
              bg-gradient-to-br from-sky-100 via-sky-200 to-blue-300">

    <!-- LOTTIE (FIX JELAS) -->
    <div id="lottie-cover"
         class="absolute inset-0 opacity-100"></div>

    <!-- LIGHT EFFECT -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-white/30 blur-2xl"></div>

  </div>

  <!-- OVERLAY -->
  <div class="relative -mt-10 flex items-center justify-between px-2">

    <!-- AVATAR -->
    <div class="bg-white p-[4px] rounded-full shadow-lg">
      <img src="/assets/avatar.jpg"
           class="w-16 h-16 rounded-full object-cover"/>
    </div>

    <!-- DONATE -->
    <button onclick="openQR()"
      class="bg-white px-4 py-2 rounded-full shadow-md flex items-center gap-2 active:scale-95">

      <i data-lucide="heart" class="w-4 h-4"></i>
      <span class="text-sm font-medium">Donate</span>

    </button>

  </div>

  <!-- TEXT -->
  <div class="mt-3 text-center">
    <h1 class="text-lg font-bold">Customin Store</h1>
    <p class="text-sm text-gray-500">Builder • Auto Cuan</p>
  </div>

</div>
<!-- ================= END HEADER ================= -->


<!-- ================= CONTENT ================= -->
<div class="mt-6 space-y-3">

  <div class="bg-black text-white text-center py-3 rounded-xl font-bold">
    🔥 Order via WhatsApp
  </div>

  <div class="bg-gray-100 p-3 rounded-xl flex justify-between">
    <span>🔥 Order via WhatsApp</span>
    <span>→</span>
  </div>

  <div class="bg-gray-100 p-3 rounded-xl flex justify-between">
    <span>Portfolio</span>
    <span>→</span>
  </div>

  <div class="bg-gray-100 p-3 rounded-xl flex justify-between">
    <span>Affiliate Tools</span>
    <span>→</span>
  </div>

</div>


<!-- ================= POPUP QR ================= -->
<div id="popupQR"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">

  <div class="bg-white rounded-2xl p-4 w-80 relative shadow-xl">

    <!-- CLOSE -->
    <button onclick="closeQR()"
      class="absolute top-3 right-3 w-7 h-7 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200">
      ✕
    </button>

    <h2 class="text-center font-semibold mb-3">Scan QRIS</h2>

    <img src="/assets/qris.webp"
         class="w-full rounded-xl"/>

  </div>

</div>


</div>

<script>
lucide.createIcons();

// LOTTIE FIX (FULL COVER)
lottie.loadAnimation({
  container: document.getElementById('lottie-cover'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: '/assets/cover.json',
  rendererSettings: {
    preserveAspectRatio: 'xMidYMid slice'
  }
});

// POPUP
function openQR(){
  const el = document.getElementById('popupQR');
  el.classList.remove('hidden');
  el.classList.add('flex');
}

function closeQR(){
  const el = document.getElementById('popupQR');
  el.classList.add('hidden');
  el.classList.remove('flex');
}
</script>

</body>
</html>

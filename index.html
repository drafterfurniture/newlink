<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="canonical" href="https://drafterfurniture.com">
<link rel="icon" href="/assets/favicon.png">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Customin">
<link rel="apple-touch-icon" href="/assets/icon-192.png">

<meta name="robots" content="index, follow">
<meta name="author" content="Customin">

<link rel="preload" href="/output.css" as="style">
<link rel="stylesheet" href="/output.css">
<link rel="preload" as="image" href="/assets/cover.webp">

<script defer src="/assets/lucide.min.js"></script>
<script defer src="/assets/lottie.min.js"></script>
<script defer src="https://ana.customin.co/script.js" data-website-id="b1e3a99c-3079-4856-af0a-a5826f57d447"></script>

<style>
body{font-family:-apple-system,BlinkMacSystemFont;background:#fff}
img{display:block}

.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(20px);
border:1px solid rgba(0,0,0,0.06);
border-radius:26px;
}

.btn{transition:.25s}
.btn:active{transform:scale(.95)}
.btn:hover{transform:scale(1.05)}

.modal{
transform:translateY(40px) scale(.95);
opacity:0;
transition:.3s ease;
}
.modal.show{
transform:translateY(0) scale(1);
opacity:1;
}

.mac{display:flex;gap:6px}
.mac span{width:10px;height:10px;border-radius:50%}
.r{background:#ff5f57}
.y{background:#febc2e}
.g{background:#28c840}

#products{scroll-behavior:smooth}
#products::-webkit-scrollbar{display:none}

/* 🔥 DONATE STYLE */
.donate-pill{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
border-radius:999px;
font-size:14px;
font-weight:500;
transition:.25s;
}
.donate-pill:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.9);
}
</style>

</head>

<body>

<main class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="card p-3">

<div class="relative h-40 rounded-2xl overflow-hidden">

<img src="/assets/cover.webp"
alt="Cover Customin Store"
class="w-full h-full object-cover">

<div class="absolute inset-0 bg-black/10"></div>

<!-- AVATAR (KIRI TENGAH) -->
<img src="/assets/avatar.jpg"
alt="Foto Profil"
class="absolute left-4 top-1/2 -translate-y-1/2 w-20 h-20 rounded-full border-4 border-white object-cover shadow-lg">

<!-- DONATE (KANAN TENGAH) -->
<button onclick="openQRIS()"
class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2 px-4 py-2 donate-pill">
<i data-lucide="heart-handshake" style="width:18px;height:18px"></i>
<span>Donate</span>
</button>

</div>

<h1 class="text-xl font-bold text-center mt-4">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a id="waBtn"
class="btn flex items-center justify-center gap-2 bg-green-500 text-white py-3 rounded-full font-semibold shadow-md">
<i data-lucide="message-circle"></i>
Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="space-y-2"></div>

<!-- PRODUCTS -->
<div id="products" class="flex gap-3 overflow-x-auto py-2"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom" class="space-y-2"></div>

<!-- FOOTER -->
<div class="flex justify-center gap-6 text-gray-500 pt-2">
<i data-lucide="instagram"></i>
<i data-lucide="linkedin"></i>
<i data-lucide="github"></i>
<i data-lucide="pen-tool"></i>
<i data-lucide="share-2"></i>
</div>

</main>

<!-- QRIS -->
<div id="qrisPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="card p-4 relative w-72">

<div class="mac absolute top-3 left-3">
<span class="r"></span>
<span class="y"></span>
<span class="g"></span>
</div>

<button onclick="closeQRIS()" class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<img src="/assets/qris.webp"
alt="QRIS Pembayaran"
class="w-full mt-4">

</div>
</div>

<!-- PRODUCT POPUP -->
<div id="productPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div id="modalBox"
class="card p-4 w-80 relative modal">

<div class="mac absolute top-3 left-3">
<span class="r"></span>
<span class="y"></span>
<span class="g"></span>
</div>

<button onclick="closeProduct()" class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<img id="pMain"
alt="Detail Produk"
class="w-full h-48 object-cover rounded-xl mt-3">

<div id="thumbs"
class="flex gap-2 mt-2 overflow-x-auto"></div>

<h2 id="pTitle" class="font-bold mt-2"></h2>
<p id="pPrice" class="text-gray-600"></p>
<p id="pDesc" class="text-sm mt-1"></p>

<div class="flex gap-2 mt-3">
<a id="pInfo"
class="flex-1 border py-2 rounded-xl text-center">Info</a>

<a id="pBuy"
class="flex-1 bg-black text-white py-2 rounded-xl text-center">Beli</a>
</div>

</div>
</div>

<script defer src="/script.js"></script>

<script>
window.addEventListener("load",()=>{
if(window.lucide){
requestIdleCallback(()=>lucide.createIcons())
}
})
</script>

</body>
</html>

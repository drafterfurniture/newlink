<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store - Builder Auto Cuan</title>
<meta name="description" content="Jual template link bio siap pakai, auto cuan, responsive dan modern.">
<meta name="robots" content="index, follow">
<meta name="author" content="Customin">

<link rel="canonical" href="https://drafterfurniture.com">

<link rel="icon" href="/assets/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  background:#ffffff;
}

/* iOS glass */
.glass {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  border:1px solid rgba(0,0,0,0.05);
}

/* popup */
.popup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  justify-content:center;
  align-items:center;
  z-index:50;
}

.popup.active {
  display:flex;
}

/* macOS button */
.mac-btn {
  width:10px;
  height:10px;
  border-radius:50%;
}
</style>
</head>

<body class="text-gray-900">

<main class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="rounded-3xl overflow-hidden border">

  <div class="relative h-36 bg-gradient-to-r from-blue-200 to-blue-400 flex items-center justify-center">

    <img src="/assets/cover.json" alt="Cover animasi"
    class="h-20 opacity-90">

    <button onclick="openQR()" 
    class="absolute right-3 bottom-3 glass px-4 py-2 rounded-full flex items-center gap-2">
      <i data-lucide="heart"></i> Donate
    </button>

  </div>

  <div class="p-4 text-center">
    <img src="/assets/avatar.jpg"
    alt="Foto profil Customin Store"
    class="w-20 h-20 rounded-full border-4 border-white -mt-12 mx-auto">

    <h1 class="text-xl font-bold mt-2">Customin Store</h1>
    <p class="text-sm text-gray-500">Builder • Auto Cuan</p>
  </div>

</div>

<!-- CTA -->
<a href="#" class="block bg-green-500 text-white text-center py-3 rounded-full font-semibold">
💬 Chat via WhatsApp
</a>

<!-- LINKS -->
<div class="space-y-3">

  <a href="#" class="block border rounded-full px-4 py-3 flex justify-between">
    Chat via WhatsApp →
  </a>

  <a href="#" class="block border rounded-full px-4 py-3 flex justify-between">
    Portfolio →
  </a>

  <a href="#" class="block border rounded-full px-4 py-3 flex justify-between">
    Affiliate Tools →
  </a>

</div>

<!-- PRODUCTS -->
<div id="products" class="flex gap-3 overflow-x-auto pb-2">

</div>

<!-- LINK BAWAH -->
<a href="#" class="block border rounded-full px-4 py-3 text-center">
Share Artikel →
</a>

</main>

<!-- POPUP QR -->
<div id="qrPopup" class="popup">
  <div class="bg-white rounded-2xl p-4 w-80">

    <div class="flex gap-2 mb-2">
      <div class="mac-btn bg-red-500"></div>
      <div class="mac-btn bg-yellow-400"></div>
      <div class="mac-btn bg-green-500"></div>
      <button onclick="closeQR()" class="ml-auto">
        <i data-lucide="x"></i>
      </button>
    </div>

    <img src="/assets/qris.webp"
    alt="QRIS pembayaran"
    class="w-full">

  </div>
</div>

<!-- POPUP PRODUK -->
<div id="productPopup" class="popup">
  <div class="bg-white rounded-2xl p-4 w-80">

    <button onclick="closeProduct()" class="absolute right-4 top-4">
      <i data-lucide="x"></i>
    </button>

    <img id="pMain"
    alt="Detail produk"
    class="w-full h-48 object-cover rounded-xl">

    <div id="thumbs" class="flex gap-2 mt-2"></div>

    <h2 id="pTitle" class="font-bold mt-3"></h2>
    <p id="pPrice" class="text-gray-500"></p>
    <p id="pDesc" class="text-sm mt-1"></p>

    <div class="flex gap-2 mt-4">
      <button class="flex-1 border py-2 rounded-xl">Info</button>
      <button class="flex-1 bg-black text-white py-2 rounded-xl">Beli</button>
    </div>

  </div>
</div>

<script>
lucide.createIcons()

const products = [
  {
    title:"Template Link Bio",
    price:"Rp99000",
    desc:"Template siap jual & responsive",
    images:["/assets/p1.jpg","/assets/p2.jpg","/assets/p3.jpg"]
  }
]

const container = document.getElementById('products')

products.forEach((p,i)=>{
  container.innerHTML += `
  <div onclick="openProduct(${i})"
  class="min-w-[45%] border rounded-2xl overflow-hidden">

    <img src="${p.images[0]}"
    alt="Produk ${p.title}"
    class="w-full aspect-square object-cover">

    <div class="p-2">
      <h2 class="text-sm font-semibold">${p.title}</h2>
      <p class="text-xs text-gray-500">${p.price}</p>
    </div>

  </div>`
})

function openProduct(i){
  const p = products[i]

  document.getElementById('productPopup').classList.add('active')

  document.getElementById('pMain').src = p.images[0]
  document.getElementById('pTitle').innerText = p.title
  document.getElementById('pPrice').innerText = p.price
  document.getElementById('pDesc').innerText = p.desc

  const thumbs = document.getElementById('thumbs')
  thumbs.innerHTML = ""

  p.images.forEach(img=>{
    thumbs.innerHTML += `
    <img src="${img}"
    alt="Thumbnail ${p.title}"
    onclick="document.getElementById('pMain').src='${img}'"
    class="w-14 h-14 object-cover rounded-lg border cursor-pointer">`
  })
}

function closeProduct(){
  document.getElementById('productPopup').classList.remove('active')
}

function openQR(){
  document.getElementById('qrPopup').classList.add('active')
}

function closeQR(){
  document.getElementById('qrPopup').classList.remove('active')
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Anto | Link in Bio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body{
 font-family:system-ui;
 background: linear-gradient(180deg,#f8fafc,#eef2ff);
 color:#111;
}

/* GLASS */
.glass{
 background: rgba(255,255,255,0.7);
 backdrop-filter: blur(14px);
 border:1px solid rgba(0,0,0,0.05);
 box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
#lottie-cover{
 background: linear-gradient(135deg,#e0f2fe,#dbeafe,#f1f5f9);
}

/* BUTTON */
.btn{transition:.25s}
.btn:hover{transform:translateY(-2px) scale(1.02)}

/* WA */
.wa{
 background: linear-gradient(135deg,#22c55e,#4ade80);
 color:white;
 box-shadow:0 10px 25px rgba(34,197,94,0.3);
}

/* CARD */
.card:hover{
 transform: translateY(-4px) scale(1.02);
}

/* HEART */
.lucide-heart{
 animation:pulse 1.5s infinite;
}
@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.2)}
 100%{transform:scale(1)}
}

/* NAV */
.bottom-nav{
 position:fixed;
 bottom:12px;
 left:50%;
 transform:translateX(-50%);
 width:92%;
 max-width:420px;
 border-radius:999px;
 padding:10px;
 display:flex;
 justify-content:space-around;
 z-index:50;
}

.nav-item{
 display:flex;
 flex-direction:column;
 align-items:center;
 font-size:10px;
 opacity:.6;
 transition:.25s;
}

.nav-item:hover{
 transform:scale(1.1);
 opacity:1;
}

/* Brand hover color */
.nav-item:nth-child(1):hover{color:#E1306C;}
.nav-item:nth-child(2):hover{color:#000;}
.nav-item:nth-child(3):hover{color:#0A66C2;}
.nav-item:nth-child(4):hover{color:#1769FF;}
.nav-item:nth-child(5):hover{color:#E60023;}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4 pb-24">

<!-- HEADER -->
<div class="relative">
  <div class="rounded-[30px] overflow-hidden">
    <div class="relative h-44 w-full">
      <div id="lottie-cover" class="w-full h-full"></div>
      <div class="absolute inset-0 bg-white/20"></div>
    </div>
  </div>

  <div class="absolute left-5 -bottom-8 right-5 flex justify-between items-center">

    <div class="w-[78px] h-[78px] rounded-full border-4 border-white overflow-hidden shadow-lg">
      <img src="/assets/profile.jpg" class="w-full h-full object-cover">
    </div>

    <button onclick="openDonate()" class="glass btn flex items-center gap-2 px-3 py-2 rounded-full text-sm">
      <i data-lucide="heart"></i> Donate
    </button>

  </div>
</div>

<div class="h-14"></div>

<!-- NAME -->
<div class="text-center mt-2">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 gap-3 mt-6"></div>

<!-- BLOG -->
<div id="blog" class="space-y-3 mt-6"></div>

</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="hidden fixed inset-0 bg-black/20 flex items-center justify-center z-50">
  <div class="glass rounded-2xl p-4 w-[90%] max-w-sm relative">
    <button onclick="closeProduct()" class="absolute top-3 right-3 w-6 h-6 bg-red-500 text-white rounded-full text-xs">✕</button>
    <img id="pImg" class="rounded-lg mb-2">
    <h2 id="pTitle" class="font-bold"></h2>
    <p id="pPrice"></p>
  </div>
</div>

<!-- DONATE MODAL -->
<div id="donateModal" class="hidden fixed inset-0 bg-black/20 flex items-center justify-center z-50">
  <div class="glass rounded-2xl p-4 w-[90%] max-w-sm relative">
    <button onclick="closeDonate()" class="absolute top-3 right-3 w-6 h-6 bg-red-500 text-white rounded-full text-xs">✕</button>
    <h2 class="text-center font-bold mb-3">Donate</h2>
    <img src="/assets/qris.webp" class="rounded-lg w-full" />
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="glass bottom-nav">

  <a href="#" class="nav-item">
    <i data-lucide="instagram"></i>
    IG
  </a>

  <a href="#" class="nav-item">
    <i data-lucide="at-sign"></i>
    Threads
  </a>

  <a href="#" class="nav-item">
    <i data-lucide="linkedin"></i>
    LinkedIn
  </a>

  <a href="#" class="nav-item">
    <i data-lucide="briefcase"></i>
    Behance
  </a>

  <a href="#" class="nav-item">
    <i data-lucide="pin"></i>
    Pinterest
  </a>

</div>

<script src="/script.js"></script>
</body>
</html>

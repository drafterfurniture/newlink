<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anto</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
 font-family:system-ui;
 background:linear-gradient(#f8fafc,#eef2ff);
}

/* HEADER CLOUD */
.header{
 background:linear-gradient(#dbeafe,#f0f9ff);
}

/* BUTTON */
.btn{
 height:54px;
 border-radius:16px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 16px;
}

/* WA */
.wa{
 background:linear-gradient(135deg,#22c55e,#4ade80);
 color:white;
}

/* PRODUCT */
.product{
 border-radius:16px;
 padding:10px;
 background:white;
}

/* FLOAT CART */
.cart{
 position:fixed;
 bottom:90px;
 right:20px;
 background:black;
 color:white;
 padding:12px 16px;
 border-radius:20px;
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4 pb-32">

<!-- HEADER -->
<div class="header h-44 rounded-2xl flex items-center justify-center relative">
 ☁️
</div>

<div class="-mt-10 flex justify-between items-center">
 <img src="/assets/profile.jpg" class="w-20 h-20 rounded-full border-4 border-white">

 <button onclick="openDonate()" class="bg-white px-4 py-2 rounded-full">
 ❤️
 </button>
</div>

<div class="text-center mt-2">
 <h1 class="font-semibold text-lg">Anto</h1>
 <p class="text-sm text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- WA -->
<div id="featured" class="mt-4"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 gap-3 mt-6"></div>

</div>

<!-- PRODUCT MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
 <div class="bg-white p-4 rounded-xl w-[90%] max-w-sm">
   <h2 id="mTitle"></h2>
   <img id="mImg" class="rounded-lg my-2">
   <p id="mPrice"></p>
   <p id="mDesc" class="text-sm text-gray-500"></p>

   <div id="thumbs" class="flex gap-2 mt-2 overflow-x-auto"></div>

   <div class="flex gap-2 mt-4">
     <button class="flex-1 border rounded-lg p-2">Demo</button>
     <button onclick="addCart()" class="flex-1 bg-green-500 text-white rounded-lg p-2">Add to Cart</button>
   </div>
 </div>
</div>

<!-- FLOAT CART -->
<div id="cart" class="cart hidden">
 🛒 <span id="cartCount">0</span>
</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio & produk digital siap jual">

<link rel="icon" href="/assets/favicon.png">
<link rel="canonical" href="https://drafterfurniture.com">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: system-ui; }

.glass {
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.65);
}

.fade {
  animation: fade .5s ease;
}
@keyframes fade {
  from {opacity:0; transform:translateY(10px)}
  to {opacity:1;}
}
</style>

</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="glass rounded-3xl shadow p-3 fade">

<div id="coverBox" class="h-36 rounded-2xl overflow-hidden bg-gradient-to-r from-sky-200 to-blue-300"></div>

<div class="flex justify-between items-center -mt-10 px-2">

<img src="/assets/avatar.jpg"
class="w-20 h-20 rounded-full border-4 border-white shadow object-cover"
alt="avatar">

<button onclick="openQRIS()"
class="glass px-4 py-2 rounded-full shadow flex items-center gap-2">
<i data-lucide="heart"></i> Donate
</button>

</div>

<h1 class="text-xl font-bold text-center mt-2">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a id="waBtn"
class="block mt-4 bg-black text-white py-3 rounded-full text-center font-semibold flex justify-center gap-2">
🔥 Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="mt-3 space-y-2"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-5 flex gap-3 overflow-x-auto"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom" class="mt-5 space-y-2"></div>

<!-- FOOTER -->
<div class="mt-6 flex justify-center gap-5 text-gray-600">
<i data-lucide="instagram"></i>
<i data-lucide="linkedin"></i>
<i data-lucide="github"></i>
<i data-lucide="pen-tool"></i>
<i data-lucide="share-2"></i>
</div>

</div>

<!-- QRIS -->
<div id="qrisPopup" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
<div class="glass p-4 rounded-2xl relative fade">
<button onclick="closeQRIS()" class="absolute top-2 right-2">✖</button>
<img src="/assets/qris.webp" class="w-60" alt="qris">
</div>
</div>

<!-- PRODUCT POPUP -->
<div id="productPopup" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="glass p-4 rounded-2xl w-80 relative fade">

<button onclick="closeProduct()" class="absolute top-2 right-2">✖</button>

<img id="pMain" class="w-full h-48 object-cover rounded-xl" alt="produk">

<div id="thumbs" class="flex gap-2 mt-2 overflow-x-auto"></div>

<h3 id="pTitle" class="font-bold mt-2"></h3>
<p id="pPrice" class="text-gray-600"></p>
<p id="pDesc" class="text-sm mt-1"></p>

<div class="flex gap-2 mt-3">
<a id="pInfo" class="flex-1 border py-2 rounded-xl text-center">Info</a>
<a id="pBuy" class="flex-1 bg-black text-white py-2 rounded-xl text-center">Beli</a>
</div>

</div>
</div>

<script src="/script.js"></script>
<script>lucide.createIcons()</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anto | Link in Bio</title>
<meta name="description" content="Link in bio modern, clean, jualan & portfolio">

<meta property="og:title" content="Anto Link Bio">
<meta property="og:image" content="/assets/avatar.jpg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: system-ui, sans-serif; }

/* smooth animation */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(15px); }
  to { opacity:1; transform: translateY(0); }
}
.animate-fadeUp { animation: fadeUp .6s ease; }
</style>

</head>

<body class="bg-gray-100 flex justify-center">

<div class="w-full max-w-md min-h-screen bg-white p-4">

<!-- HEADER TRUE MATCH -->
<div class="relative mb-12 animate-fadeUp">

  <!-- CARD -->
  <div class="h-36 rounded-3xl overflow-hidden relative">

    <div class="absolute inset-0 bg-gradient-to-r from-orange-500 via-red-500 to-yellow-400"></div>

    <div class="absolute bottom-0 left-0 w-40 h-40 bg-teal-400/40 blur-3xl"></div>

    <div class="absolute inset-0 backdrop-blur-[40px] bg-white/10"></div>

    <div class="absolute top-0 right-0 w-40 h-40 bg-yellow-200/30 blur-3xl"></div>

  </div>

  <!-- AVATAR -->
  <div class="absolute -bottom-6 left-6">
    <div class="relative">
      <div class="absolute inset-0 rounded-full bg-white blur-md opacity-40 scale-110"></div>

      <img id="avatar"
        class="relative w-16 h-16 rounded-full border-4 border-white object-cover shadow-xl"/>
    </div>
  </div>

  <!-- BADGE -->
  <div class="absolute bottom-3 right-4">
    <div class="bg-white/90 backdrop-blur-xl px-4 py-2 rounded-full flex items-center gap-2 shadow-md">
      <i id="badgeIcon" data-lucide="zap" class="w-4 h-4"></i>
      <span id="badgeText" class="text-sm font-medium">Open Order</span>
    </div>
  </div>

  <!-- BIO -->
  <div class="mt-8 ml-24">
    <p id="bio" class="text-sm text-gray-700 font-medium"></p>
  </div>

</div>

<!-- FEATURED -->
<div id="featured"></div>

<!-- LINKS -->
<div id="links" class="space-y-3"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-6"></div>

<!-- GALLERY -->
<div id="gallery" class="grid grid-cols-3 gap-2 mt-6"></div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white p-4 rounded-xl w-11/12 max-w-sm relative">
    <button onclick="closeModal()" class="absolute top-2 right-2">✕</button>

    <img id="modalImg" class="rounded mb-3"/>
    <h2 id="modalTitle" class="font-bold"></h2>
    <p id="modalDesc" class="text-sm text-gray-500 mb-3"></p>

    <div class="flex gap-2">
      <a id="modalDemo" class="flex-1 bg-gray-200 py-2 text-center rounded">Demo</a>
      <a id="modalBuy" class="flex-1 bg-black text-white py-2 text-center rounded">Buy</a>
    </div>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Link Bio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: system-ui, sans-serif; }
</style>

</head>

<body class="bg-gray-100 flex justify-center">

<div class="w-full max-w-md min-h-screen bg-white p-4">

<!-- ================= HEADER REAL MATCH ================= -->
<div class="bg-white rounded-3xl p-3 shadow-sm">

  <!-- IMAGE / BACKGROUND -->
  <div class="relative rounded-2xl overflow-hidden h-28">

    <!-- FAKE IMAGE BLUR STYLE -->
    <div class="absolute inset-0 bg-gradient-to-r from-orange-500 via-red-500 to-yellow-400"></div>
    <div class="absolute inset-0 backdrop-blur-2xl opacity-60"></div>

    <!-- LEFT COOL COLOR -->
    <div class="absolute bottom-0 left-0 w-32 h-32 bg-teal-400/40 blur-2xl"></div>

    <!-- LIGHT -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-200/40 blur-2xl"></div>

  </div>

  <!-- CONTENT -->
  <div class="flex items-center justify-between -mt-6 px-2">

    <!-- LEFT -->
    <div class="flex items-center gap-3">

      <!-- AVATAR -->
      <div class="bg-white p-1 rounded-full shadow-md">
        <img id="avatar"
          src="/assets/avatar.jpg"
          class="w-14 h-14 rounded-full object-cover"/>
      </div>

      <!-- TEXT -->
      <p id="bio" class="text-sm text-gray-700 font-medium">
        Builder • Auto Cuan
      </p>

    </div>

    <!-- BADGE -->
    <div class="bg-white px-4 py-2 rounded-full shadow-md flex items-center gap-2">

      <i data-lucide="zap" class="w-4 h-4"></i>
      <span class="text-sm font-medium">Open Order</span>

    </div>

  </div>

</div>
<!-- ================= END HEADER ================= -->


<!-- BUTTON -->
<div class="mt-6 space-y-3">

  <div class="bg-black text-white text-center py-3 rounded-xl font-bold">
    🔥 Order via WhatsApp
  </div>

  <div class="bg-gray-100 p-3 rounded-xl flex justify-between">
    <span>🔥 Order via WhatsApp</span>
    <span>→</span>
  </div>

  <div class="bg-gray-100 p-3 rounded-xl flex justify-between">
    <span>Portfolio</span>
    <span>→</span>
  </div>

  <div class="bg-gray-100 p-3 rounded-xl flex justify-between">
    <span>Affiliate Tools</span>
    <span>→</span>
  </div>

</div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anto | Link in Bio</title>
<meta name="description" content="All my links, products, and portfolio" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{font-family:system-ui;background:#f5f5f5}
.gradient{background:linear-gradient(120deg,#ff7a18,#ff3cac,#784ba0,#2b86c5);background-size:300% 300%;animation:grad 8s ease infinite}
@keyframes grad{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.social{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:9999px;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.08);transition:.25s}
.social:hover{transform:translateY(-3px) scale(1.08)}
.social i{animation:pulse 2.5s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

<!-- HEADER (ULTRA PIXEL PERFECT) -->
<div class="relative">

  <!-- CARD -->
  <div class="rounded-[30px] overflow-hidden bg-white shadow-[0_10px_30px_rgba(0,0,0,0.08)]">
    <div class="relative h-40 w-full">
      <div id="lottie-cover" class="w-full h-full"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
lottie.loadAnimation({
  container: document.getElementById('lottie-cover'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: '/assets/cover.json'
});
</script>

      <!-- subtle gradient overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent"></div>
    </div>
  </div>

  <!-- FLOAT LAYER -->
  <div class="absolute left-5 -bottom-7 flex items-center gap-3">
    
    <!-- Avatar -->
    <div class="relative">
      <div class="absolute inset-0 rounded-full blur-md bg-black/10"></div>
      <div class="relative w-[68px] h-[68px] rounded-full border-[4px] border-white bg-white overflow-hidden shadow-md">
        <img src="/assets/profile.jpg" class="w-full h-full object-cover">
      </div>
    </div>

    <!-- Badge -->
    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-[0_6px_18px_rgba(0,0,0,0.12)] text-sm font-medium backdrop-blur">
      <div class="w-5 h-5 bg-red-500 rounded flex items-center justify-center text-white text-[10px] font-bold">A</div>
      <span class="text-gray-700 tracking-tight">Adobe Co.</span>
    </div>

  </div>

</div>

<div class="h-16"></div>

<div class="text-center">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- COUNTDOWN -->
<div id="countdown" class="text-center text-sm text-red-500 mt-2"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-6"></div>

</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="canonical" href="https://drafterfurniture.com">
<link rel="icon" href="/assets/favicon.png">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Customin">
<link rel="apple-touch-icon" href="/assets/icon-192.png">

<meta name="robots" content="index, follow">
<meta name="author" content="Customin">

<!-- CRITICAL CSS -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont;background:#fff}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:26px}
.btn:active{transform:scale(.95)}
.hidden{display:none}
</style>

<!-- NON CRITICAL -->
<link rel="stylesheet" href="/style.css">

<script src="/assets/lucide.min.js"></script>
<script defer src="https://ana.customin.co/script.js" data-website-id="b1e3a99c-3079-4856-af0a-a5826f57d447"></script>

</head>

<body>

<main class="container">

<!-- HEADER -->
<div class="card header">

<div id="coverBox" class="cover"></div>

<div class="header-top">

<img src="/assets/avatar.jpg" alt="Foto Profil Drafter Furniture" class="avatar">

<button onclick="openQRIS()" class="btn donate">
<i data-lucide="heart-handshake"></i> Donate
</button>

</div>

<h1 class="title">Customin Store</h1>
<p class="subtitle">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a id="waBtn" class="btn wa">
<i data-lucide="message-circle"></i>
Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="links"></div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom" class="links"></div>

<!-- FOOTER -->
<div class="footer">
<i data-lucide="instagram"></i>
<i data-lucide="linkedin"></i>
<i data-lucide="github"></i>
<i data-lucide="pen-tool"></i>
<i data-lucide="share-2"></i>
</div>

</main>

<!-- QRIS -->
<div id="qrisPopup" class="popup hidden">
<div class="card popup-box">

<div class="mac">
<span class="r"></span>
<span class="y"></span>
<span class="g"></span>
</div>

<button onclick="closeQRIS()" class="close">
<i data-lucide="x"></i>
</button>

<img src="/assets/qris.webp" alt="QRIS Pembayaran">

</div>
</div>

<!-- PRODUCT -->
<div id="productPopup" class="popup hidden">
<div id="modalBox" class="card popup-box modal">

<div class="mac">
<span class="r"></span>
<span class="y"></span>
<span class="g"></span>
</div>

<button onclick="closeProduct()" class="close">
<i data-lucide="x"></i>
</button>

<img id="pMain" alt="Detail Produk" class="main-img">

<div id="thumbs" class="thumbs"></div>

<h2 id="pTitle"></h2>
<p id="pPrice"></p>
<p id="pDesc"></p>

<div class="actions">
<a id="pInfo">Info</a>
<a id="pBuy" class="buy">Beli</a>
</div>

</div>
</div>

<script src="/script.js"></script>
<script>
window.addEventListener("DOMContentLoaded",()=>{
  lucide.createIcons()
})
</script>

</body>
</html>

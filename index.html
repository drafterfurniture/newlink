<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store | Template Link Bio</title>
<meta name="description" content="Template link bio & produk digital siap jual.">

<link rel="canonical" href="https://drafterfurniture.com">
<link rel="icon" href="/assets/favicon.png">

<!-- OG -->
<meta property="og:title" content="Customin Store">
<meta property="og:description" content="Template siap jual">
<meta property="og:image" content="/assets/cover.jpg">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="bg-white rounded-3xl shadow p-4">

<div class="h-36 rounded-2xl bg-gradient-to-r from-sky-300 to-blue-400 flex items-center justify-center">
  <img src="/assets/cover.jpg" class="h-full object-contain" alt="cover">
</div>

<div class="flex items-center justify-between -mt-10 px-2">
  <img src="/assets/avatar.jpg" class="w-20 h-20 rounded-full border-4 border-white shadow" alt="avatar">

  <button onclick="openQRIS()" class="bg-white px-4 py-2 rounded-full shadow flex items-center gap-2">
    ❤️ Donate
  </button>
</div>

<h1 class="text-xl font-bold text-center mt-2">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a href="#" id="waBtn" class="block mt-4 bg-black text-white text-center py-3 rounded-full font-semibold">
🔥 Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="mt-3 space-y-2"></div>

<!-- PRODUCTS -->
<div class="mt-5 overflow-x-auto flex gap-3" id="products"></div>

<!-- FOOTER -->
<div class="mt-6 flex justify-center gap-4 text-gray-600">
  <i data-lucide="instagram"></i>
  <i data-lucide="github"></i>
  <i data-lucide="linkedin"></i>
  <i data-lucide="pinterest"></i>
</div>

</div>

<!-- POPUP QRIS -->
<div id="qrisPopup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white rounded-2xl p-4 relative">
    <button onclick="closeQRIS()" class="absolute top-2 right-2">✖</button>
    <img src="/assets/qris.webp" class="w-60" alt="QRIS">
  </div>
</div>

<!-- POPUP PRODUCT -->
<div id="productPopup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white rounded-2xl p-4 w-80 relative">
    <button onclick="closeProduct()" class="absolute top-2 right-2">✖</button>
    <img id="pImage" class="w-full rounded-xl" alt="produk">
    <h3 id="pTitle" class="font-bold mt-2"></h3>
    <p id="pPrice" class="text-gray-600"></p>
    <p id="pDesc" class="text-sm mt-1"></p>

    <a id="pBuy" class="block mt-3 bg-black text-white text-center py-2 rounded-xl">Beli</a>
  </div>
</div>

<script src="/script.js"></script>
<script>lucide.createIcons()</script>

</body>
</html>

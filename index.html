<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="canonical" href="https://drafterfurniture.com">
<link rel="icon" href="/assets/favicon.png">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ffffff">

<!-- ✅ TAILWIND BUILD -->
<link rel="preload" href="/output.css" as="style">
<link rel="stylesheet" href="/output.css">

<!-- ⚡ CRITICAL CSS -->
<style>
body{font-family:-apple-system,BlinkMacSystemFont;background:#fff;margin:0}

/* gradient kuning animasi */
.gradient-anim{
background:linear-gradient(120deg,#fef08a,#fde047,#facc15,#eab308);
background-size:200% 200%;
animation:gradientMove 6s ease infinite;
}
@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* tombol donate */
.donate-pill{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:999px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
border:1px solid rgba(0,0,0,0.05);
}

/* whatsapp */
.wa-btn{
background:linear-gradient(120deg,#fde047,#facc15,#eab308);
background-size:200% 200%;
animation:gradientMove 5s ease infinite;
color:#000;
}

.modal{
transform:translateY(40px) scale(.95);
opacity:0;
transition:.3s ease;
}
.modal.show{
transform:translateY(0) scale(1);
opacity:1;
}
</style>

<!-- LOCAL -->
<script defer src="/assets/lucide.min.js"></script>
<script defer src="/assets/lottie.min.js"></script>

</head>

<body>

<main class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="bg-white/90 backdrop-blur border rounded-[26px] p-3">

<div class="relative h-40 rounded-2xl overflow-visible">

  <!-- background -->
  <div class="absolute inset-0 rounded-2xl gradient-anim"></div>

  <!-- lottie -->
  <div id="coverBox"
  class="absolute inset-0 rounded-2xl overflow-hidden"></div>

  <!-- avatar -->
  <img src="/assets/avatar.jpg"
  alt="Foto profil Customin Store"
  class="absolute left-4 bottom-0 translate-y-1/2
  w-20 h-20 rounded-full border-4 border-white object-cover shadow-lg">

  <!-- donate -->
  <button onclick="openQRIS()"
  class="absolute right-4 bottom-0 translate-y-1/2
  flex items-center gap-2 px-4 py-2 donate-pill">
  <i data-lucide="heart-handshake"></i>
  Donate
  </button>

</div>

<div class="h-16"></div>

<h1 class="text-xl font-bold text-center">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- WA -->
<a id="waBtn"
class="wa-btn flex items-center justify-center gap-2 py-3 rounded-full font-semibold shadow">
<i data-lucide="message-circle"></i>
Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="space-y-2"></div>

<!-- PRODUCTS -->
<div id="products" class="flex gap-3 overflow-x-auto py-2"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom" class="space-y-2"></div>

<!-- FOOTER -->
<div class="flex justify-center gap-6 text-gray-500 pt-2">
<i data-lucide="instagram"></i>
<i data-lucide="linkedin"></i>
<i data-lucide="github"></i>
<i data-lucide="pen-tool"></i>
<i data-lucide="share-2"></i>
</div>

</main>

<!-- QRIS -->
<div id="qrisPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="bg-white rounded-2xl p-4 relative w-72">

<button onclick="closeQRIS()" class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<img src="/assets/qris.webp" class="w-full mt-4">

</div>
</div>

<!-- PRODUCT -->
<div id="productPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div id="modalBox"
class="bg-white rounded-2xl p-4 w-80 relative modal">

<button onclick="closeProduct()" class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<img id="pMain"
class="w-full h-48 object-cover rounded-xl mt-3">

<div id="thumbs"
class="flex gap-2 mt-2 overflow-x-auto"></div>

<h2 id="pTitle" class="font-bold mt-2"></h2>
<p id="pPrice" class="text-gray-600"></p>
<p id="pDesc" class="text-sm mt-1"></p>

<div class="flex gap-2 mt-3">
<a id="pInfo" class="flex-1 border py-2 rounded-xl text-center">Info</a>
<a id="pBuy" class="flex-1 bg-black text-white py-2 rounded-xl text-center">Beli</a>
</div>

</div>
</div>

<script defer src="/script.js"></script>

<script>
window.addEventListener("load",()=>{

  // lucide
  if(window.lucide){
    requestIdleCallback(()=>lucide.createIcons())
  }

  // lottie (delay biar LCP aman)
  if(window.lottie){
    setTimeout(()=>{
      lottie.loadAnimation({
        container:document.getElementById("coverBox"),
        renderer:"svg",
        loop:true,
        autoplay:true,
        path:"/assets/cover.json"
      })
    },300)
  }

})
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Customin</title>

<meta name="description" content="Portfolio, produk dan artikel custom furniture.">

<link rel="stylesheet" href="style.css">

<script defer src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<main class="container">

<!-- HEADER -->

<header class="hero">

<div class="hero-card">

<img src="avatar.jpg" class="hero-avatar">

<h1>Customin</h1>

<p>Custom furniture • Kayu • Aluminium</p>

</div>

</header>

<!-- PORTFOLIO -->

<section>

<h2>Portfolio</h2>

<div id="portfolio-grid" class="gallery"></div>

</section>


<!-- PRODUCTS -->

<section>

<h2>Produk</h2>

<div id="product-grid" class="product-grid"></div>

</section>


<!-- ARTICLES -->

<section>

<h2>Artikel</h2>

<div id="article-list"></div>

</section>

</main>


<!-- PORTFOLIO MODAL -->

<div id="portfolio-modal" class="modal">

<div class="modal-content">

<span id="close-portfolio">&times;</span>

<img id="portfolio-main">

<div id="portfolio-thumbs"></div>

<h3 id="portfolio-title"></h3>

<p id="portfolio-category"></p>

<p id="portfolio-desc"></p>

<div class="modal-buttons">

<a id="portfolio-demo" class="btn">Demo</a>

<a id="portfolio-contact" class="btn primary">Hubungi</a>

</div>

</div>

</div>


<!-- PRODUCT MODAL -->

<div id="product-modal" class="modal">

<div class="modal-content">

<span id="close-product">&times;</span>

<img id="product-main">

<div id="product-thumbs"></div>

<h3 id="product-title"></h3>

<p id="product-price"></p>

<p id="product-desc"></p>

<div class="modal-buttons">

<a id="product-demo" class="btn">Demo</a>

<a id="product-buy" class="btn primary">Beli</a>

</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>

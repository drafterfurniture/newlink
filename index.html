<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>

<link rel="stylesheet" href="/output.css">

<style>
body{font-family:-apple-system,BlinkMacSystemFont;margin:0;background:#fff}

/* gradient */
.gradient-anim{
background:linear-gradient(120deg,#fef08a,#fde047,#facc15,#eab308);
background-size:200% 200%;
animation:gradientMove 6s ease infinite;
}
@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.wa-btn{
background:linear-gradient(120deg,#fde047,#facc15,#eab308);
color:#000;
}

.donate-pill{
background:#fff;
border-radius:999px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
border:1px solid rgba(0,0,0,0.05);
}
</style>

<script defer src="/assets/lucide.min.js"></script>
<script defer src="/assets/lottie.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.min.js"></script>

</head>

<body>

<main class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="bg-white/90 backdrop-blur border rounded-[26px] p-3">

<div class="relative h-40 rounded-2xl overflow-visible">

<div class="absolute inset-0 rounded-2xl gradient-anim"></div>

<div id="coverBox"
class="absolute inset-0 rounded-2xl overflow-hidden"></div>

<img src="/assets/avatar.jpg"
alt="Foto profil Customin Store"
class="absolute left-4 bottom-0 translate-y-1/2
w-20 h-20 rounded-full border-4 border-white object-cover shadow-lg">

<button onclick="openDonateSelector()"
class="absolute right-4 bottom-0 translate-y-1/2
flex items-center gap-2 px-4 py-2 donate-pill">
<i data-lucide="heart-handshake"></i>
Donate
</button>

</div>

<div class="h-16"></div>

<h1 class="text-xl font-bold text-center">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CONNECT -->
<button id="walletBtn" onclick="openWalletModal()"
class="wa-btn flex items-center justify-center gap-2 py-3 rounded-full font-semibold shadow">
<i data-lucide="wallet"></i>
Connect Wallet
</button>

<!-- LINKS & PRODUCTS -->
<div id="links" class="space-y-2"></div>
<div id="products" class="flex gap-3 overflow-x-auto py-2"></div>
<div id="linksBottom" class="space-y-2"></div>

</main>

<!-- WALLET MODAL -->
<div id="walletModal"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="bg-white rounded-2xl p-4 w-80">

<h2 class="font-bold text-center mb-3">Connect Wallet</h2>

<button onclick="connectInjected()"
class="w-full border py-2 rounded-lg mb-2">
MetaMask / Browser Wallet
</button>

<button onclick="connectWC()"
class="w-full bg-black text-white py-2 rounded-lg">
WalletConnect
</button>

</div>
</div>

<!-- DONATE SELECT -->
<div id="donateModal"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-4 rounded-2xl w-72 text-center">

<h2 class="font-bold mb-3">Pilih Metode</h2>

<button onclick="openQRIS()"
class="w-full border py-2 rounded-lg mb-2">
QRIS
</button>

<button onclick="openCrypto()"
class="w-full bg-black text-white py-2 rounded-lg">
Crypto
</button>

</div>
</div>

<!-- QRIS -->
<div id="qrisPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-4 rounded-2xl w-72 relative">

<button onclick="closeQRIS()" class="absolute top-3 right-3">✕</button>

<img src="/assets/qris.webp" class="w-full mt-4">

</div>
</div>

<!-- CRYPTO -->
<div id="cryptoModal"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-4 rounded-2xl w-80">

<h2 class="font-bold mb-2 text-center">Donate Crypto</h2>

<div id="walletInfo" class="text-center text-sm mb-3">
Not connected
</div>

<input id="amount"
placeholder="Nominal ETH (0.005)"
class="w-full border p-2 rounded-lg mb-3">

<button onclick="sendCrypto()"
class="w-full bg-black text-white py-2 rounded-lg">
Send
</button>

</div>
</div>

<script defer src="/script.js"></script>

<script>
let provider, signer, userAddress, wcProvider
const RECEIVER="0x76e7191be489b31932b9656fe4a83d82E6Cc9FFC"

// MODAL
function openWalletModal(){walletModal.classList.remove("hidden")}
function closeWalletModal(){walletModal.classList.add("hidden")}

// CONNECT INJECTED (PRIORITAS BRAVE FIX)
async function connectInjected(){

  if(!window.ethereum){
    alert("Wallet tidak ditemukan")
    return
  }

  try{
    provider = new ethers.providers.Web3Provider(window.ethereum)

    await window.ethereum.request({
      method:"eth_requestAccounts"
    })

    signer = provider.getSigner()
    userAddress = await signer.getAddress()

    afterConnect()

  }catch(e){
    alert("User reject / error")
  }
}

// WALLETCONNECT
async function connectWC(){

  try{
    wcProvider = await window.EthereumProvider.init({
      projectId:"demo",
      chains:[1],
      showQrModal:true
    })

    await wcProvider.enable()

    provider = new ethers.providers.Web3Provider(wcProvider)
    signer = provider.getSigner()
    userAddress = await signer.getAddress()

    afterConnect()

  }catch(e){
    alert("WalletConnect gagal")
  }
}

// AFTER CONNECT
function afterConnect(){

  closeWalletModal()

  document.getElementById("walletBtn").innerText =
  userAddress.slice(0,6)+"..."

  loadBalance()
}

// BALANCE
async function loadBalance(){
  const bal = await provider.getBalance(userAddress)
  const eth = ethers.utils.formatEther(bal)

  document.getElementById("walletInfo").innerHTML =
  `${parseFloat(eth).toFixed(4)} ETH`
}

// DONATE FLOW
function openDonateSelector(){donateModal.classList.remove("hidden")}
function openQRIS(){donateModal.classList.add("hidden");qrisPopup.classList.remove("hidden")}
function closeQRIS(){qrisPopup.classList.add("hidden")}
function openCrypto(){donateModal.classList.add("hidden");cryptoModal.classList.remove("hidden")}

// SEND
async function sendCrypto(){

  if(!signer){
    alert("Connect wallet dulu")
    return
  }

  const amount = document.getElementById("amount").value || "0.001"

  try{
    const tx = await signer.sendTransaction({
      to: RECEIVER,
      value: ethers.utils.parseEther(amount)
    })

    alert("Processing...")
    await tx.wait()

    alert("Berhasil 🔥")

  }catch(e){
    alert("Transaksi gagal")
  }
}

// INIT
window.onload=()=>{

  if(window.lucide) lucide.createIcons()

  if(window.lottie){
    lottie.loadAnimation({
      container:document.getElementById("coverBox"),
      renderer:"svg",
      loop:true,
      autoplay:true,
      path:"/assets/cover.json"
    })
  }

}
</script>

</body>
</html>

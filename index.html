<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anto | Link in Bio</title>
<meta name="description" content="All my links, products, and portfolio" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{font-family:system-ui;background:#f5f5f5}
.glass{backdrop-filter: blur(12px); background: rgba(255,255,255,0.7)}
.gradient{background: linear-gradient(120deg,#ff7a18,#ff3cac,#784ba0,#2b86c5);background-size:300% 300%;animation:grad 8s ease infinite}
@keyframes grad{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.fade{animation:fade .6s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

<!-- ULTRA HEADER (FIXED & CLEAN) -->
<div class="relative rounded-3xl overflow-hidden shadow-lg bg-white">
  <!-- Cover -->
  <div class="h-32 w-full overflow-hidden">
    <img src="/assets/cover.jpg" class="w-full h-full object-cover" loading="lazy">
    <!-- subtle overlay -->
    <div class="absolute inset-0 bg-black/5"></div>
  </div>

  <!-- Avatar + Badge -->
  <div class="absolute left-4 -bottom-8 flex items-center gap-3">
    <img src="/assets/profile.jpg" class="w-16 h-16 rounded-full border-[3px] border-white shadow-md bg-white object-cover">

    <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full shadow text-xs font-medium">
      <img src="/assets/logo.png" class="w-4 h-4 object-contain">
      <span>Adobe Co.</span>
    </div>
  </div>
</div>

<!-- spacing fix -->
<div class="h-12"></div>

<!-- NAME -->
<div class="text-center mt-2">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-6"></div>

<!-- GALLERY -->
<div id="gallery" class="grid grid-cols-2 gap-2 mt-6"></div>

<!-- SOCIAL -->
<div id="social" class="flex justify-center gap-4 mt-6"></div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
<div class="glass p-4 rounded-xl max-w-sm w-full">
<img id="modalImg" class="rounded-lg mb-2" />
<h2 id="modalTitle" class="font-bold"></h2>
<p id="modalDesc" class="text-sm"></p>
<a id="modalBuy" class="block mt-3 bg-black text-white p-2 rounded text-center">Buy</a>
<button onclick="closeModal()" class="mt-2 text-sm">Close</button>
</div>
</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="icon" href="/assets/favicon.png">
<link rel="manifest" href="/manifest.json">

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#fff;
  color:#111;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

/* CARD IOS */
.card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,0.06);
  border-radius:28px;
  padding:16px;
}

/* HEADER COVER */
.cover{
  height:140px;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(135deg,#cfe9ff,#89c6ff);
}

/* AVATAR */
.avatar{
  width:80px;height:80px;
  border-radius:50%;
  border:4px solid #fff;
  margin:-40px auto 8px;
  display:block;
}

/* TITLE */
h1{text-align:center;font-size:20px}
.subtitle{text-align:center;color:#777;font-size:14px}

/* BUTTON */
.btn{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:14px;
  border-radius:999px;
  background:#25D366;
  color:#fff;
  font-weight:600;
  text-decoration:none;
  margin-top:12px;
  transition:.2s;
}
.btn:active{transform:scale(.94)}

/* LINK LIST */
.link{
  background:#fff;
  border:1px solid rgba(0,0,0,0.06);
  padding:14px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  text-decoration:none;
  color:#111;
}

/* PRODUCTS */
.products{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-top:12px;
}

.product{
  min-width:48%;
  border-radius:18px;
  border:1px solid rgba(0,0,0,0.06);
  overflow:hidden;
}

.product img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.product h2{
  font-size:14px;
  padding:6px;
}

.product p{
  font-size:12px;
  color:#666;
  padding:0 6px 8px;
}

/* FOOTER */
.footer{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:16px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.modal.show{display:flex}

.modal-box{
  width:90%;
  max-width:320px;
  background:#fff;
  border-radius:20px;
  padding:16px;
}

/* THUMB */
.thumbs{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.thumbs img{
  width:50px;height:50px;
  object-fit:cover;
  border-radius:8px;
}

/* CLOSE */
.close{
  position:absolute;
  right:12px;
  top:12px;
  cursor:pointer;
}
</style>

</head>

<body>

<main class="container">

<!-- HEADER -->
<div class="card">
  <div id="coverBox" class="cover"></div>

  <img src="/assets/avatar.jpg" class="avatar">

  <h1>Customin Store</h1>
  <p class="subtitle">Builder • Auto Cuan</p>
</div>

<!-- CTA -->
<a id="waBtn" class="btn">💬 Chat via WhatsApp</a>

<!-- LINKS -->
<div id="links"></div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom"></div>

<!-- FOOTER -->
<div class="footer">
  <span>📸</span>
  <span>💼</span>
  <span>💻</span>
</div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span onclick="closeModal()" class="close">✕</span>
    <img id="mImg" style="width:100%;border-radius:12px;">
    <div class="thumbs" id="thumbs"></div>
    <h2 id="mTitle"></h2>
    <p id="mPrice"></p>
    <p id="mDesc"></p>
  </div>
</div>

<script>

/* DATA INLINE (NO JSON = FAST) */
const data={
links:[
{title:"Chat via WhatsApp",url:"#"},
{title:"Portfolio",url:"#"}
],
linksBottom:[
{title:"Artikel",url:"#"}
],
products:[
{
title:"Template Link Bio",
price:"Rp99.000",
desc:"Siap jual",
images:["/assets/p1.jpg","/assets/p2.jpg"]
}
]
}

/* RENDER */
data.links.forEach(l=>{
links.innerHTML+=`<a class="link" href="${l.url}">${l.title} →</a>`
})

data.linksBottom.forEach(l=>{
linksBottom.innerHTML+=`<a class="link" href="${l.url}">${l.title} →</a>`
})

data.products.forEach((p,i)=>{
products.innerHTML+=`
<div class="product" onclick="openProduct(${i})">
<img src="${p.images[0]}">
<h2>${p.title}</h2>
<p>${p.price}</p>
</div>`
})

/* MODAL */
function openProduct(i){
const p=data.products[i]
modal.classList.add("show")

mImg.src=p.images[0]
mTitle.innerText=p.title
mPrice.innerText=p.price
mDesc.innerText=p.desc

thumbs.innerHTML=""
p.images.forEach(img=>{
thumbs.innerHTML+=`
<img src="${img}" onclick="mImg.src='${img}'">
`
})
}

function closeModal(){
modal.classList.remove("show")
}

/* WA */
waBtn.href="https://wa.me/628xxxx"

/* LOTTIE */
lottie.loadAnimation({
container:document.getElementById("coverBox"),
renderer:"svg",
loop:true,
autoplay:true,
path:"/assets/cover.json"
})

</script>

</body>
</html>

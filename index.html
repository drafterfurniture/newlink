<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Customin</title>

<meta name="description" content="Custom furniture kayu dan aluminium">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- TOPBAR -->

<header class="topbar">

<h2>Customin</h2>

<div class="menu">

<a href="blog.html">Blog</a>

<button id="cart-btn">
Cart (<span id="cart-count">0</span>)
</button>

</div>

</header>


<!-- HERO -->

<section class="hero">

<img src="avatar.jpg" class="avatar">

<h2>Custom Furniture</h2>

<p>Kayu • Aluminium • Interior</p>

</section>


<!-- LINKS -->

<section>

<div class="links">

<a class="link-btn" href="#">
Website
</a>

<a class="link-btn" href="#">
Instagram
</a>

<a class="link-btn" href="#">
WhatsApp
</a>

</div>

</section>


<!-- PORTFOLIO -->

<section>

<h3>Portfolio</h3>

<div id="portfolio-grid" class="grid3"></div>

</section>


<!-- PRODUCTS -->

<section>

<h3>Produk</h3>

<div id="product-grid" class="grid2"></div>

</section>


</div>


<!-- PORTFOLIO MODAL -->

<div id="portfolio-modal" class="modal">

<div class="modal-content">

<span id="close-portfolio">✕</span>

<img id="portfolio-main">

<div id="portfolio-thumbs"></div>

<h3 id="portfolio-title"></h3>

<p id="portfolio-category"></p>

<p id="portfolio-desc"></p>

<div class="modal-buttons">

<a id="portfolio-demo" class="btn">
Demo
</a>

<a id="portfolio-contact" class="btn primary">
Hubungi
</a>

</div>

</div>

</div>


<!-- PRODUCT MODAL -->

<div id="product-modal" class="modal">

<div class="modal-content">

<span id="close-product">✕</span>

<img id="product-main">

<div id="product-thumbs"></div>

<h3 id="product-title"></h3>

<p id="product-price"></p>

<p id="product-desc"></p>

<div class="modal-buttons">

<button id="add-to-cart" class="btn primary">
Add to Cart
</button>

<a id="product-demo" class="btn">
Demo
</a>

</div>

</div>

</div>


<!-- CART MODAL -->

<div id="cart-modal" class="modal">

<div class="modal-content">

<h3>Cart</h3>

<div id="cart-items"></div>

<button id="checkout" class="btn primary">
Checkout via WhatsApp
</button>

</div>

</div>


<script src="script.js"></script>

</body>

</html>

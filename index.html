<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Anto | Link in Bio</title>
<meta name="description" content="All my links, products, and portfolio" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body{font-family:system-ui;background:#f5f5f5}

/* HEADER ORANGE */
#lottie-cover{
  background: linear-gradient(135deg,#ff7a18,#ff9a3c,#ffb347);
}

/* SOCIAL */
.social{
 width:38px;height:38px;display:flex;align-items:center;justify-content:center;
 border-radius:9999px;background:#fff;
 box-shadow:0 4px 10px rgba(0,0,0,.08);
 transition:.25s;
}
.social:hover{transform:translateY(-3px) scale(1.08)}
.social i{animation:pulse 2.5s infinite}
@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.1)}
 100%{transform:scale(1)}
}

/* LINKS */
.link,.product{transition:.25s}
.link:hover{transform:translateY(-2px) scale(1.02)}
.product:hover{transform:translateY(-3px) scale(1.02)}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="relative">
  <div class="rounded-[30px] overflow-hidden bg-white shadow-lg">
    <div id="lottie-cover" class="h-40"></div>
  </div>

  <!-- FLOAT -->
  <div class="absolute left-5 -bottom-7 flex items-center gap-3">
    <div class="w-[68px] h-[68px] rounded-full border-4 border-white bg-white overflow-hidden shadow-md">
      <img src="/assets/profile.jpg" class="w-full h-full object-cover">
    </div>

    <div class="flex gap-2">
      <a href="#" class="social"><i data-lucide="github"></i></a>
      <a href="#" class="social"><i data-lucide="linkedin"></i></a>
      <a href="#" class="social"><i data-lucide="instagram"></i></a>
      <a href="#" class="social"><i data-lucide="message-circle"></i></a>
    </div>
  </div>
</div>

<div class="h-16"></div>

<div class="text-center">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- COUNTDOWN -->
<div id="countdown" class="text-center text-sm text-red-500 mt-2"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-6"></div>

</div>

<script src="/script.js"></script>
</body>
</html>

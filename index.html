<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="canonical" href="https://drafterfurniture.com">
<link rel="icon" href="/assets/favicon.png">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Customin">
<link rel="apple-touch-icon" href="/assets/icon-192.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#fff;
}

.card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,0.06);
  border-radius:26px;
}

.btn{transition:.25s}
.btn:active{transform:scale(.95)}

.modal{
  transform:translateY(40px) scale(.95);
  opacity:0;
  transition:.3s ease;
}
.modal.show{
  transform:translateY(0) scale(1);
  opacity:1;
}

.mac{display:flex;gap:6px}
.mac span{
  width:10px;height:10px;border-radius:50%
}
.r{background:#ff5f57}
.y{background:#febc2e}
.g{background:#28c840}

#products{
  scroll-behavior:smooth;
}
#products::-webkit-scrollbar{
  display:none;
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="card p-3">

<div id="coverBox"
class="h-36 rounded-2xl overflow-hidden flex items-center justify-center
bg-gradient-to-r from-blue-200 to-blue-400"></div>

<div class="flex justify-between items-center -mt-10 px-2">

<img src="/assets/avatar.jpg" alt="Foto Profil Drafter Furniture"
class="w-20 h-20 rounded-full border-4 border-white object-cover">

<button onclick="openQRIS()"
class="btn bg-white px-4 py-2 rounded-full flex items-center gap-2 border">
<i data-lucide="heart"></i> Donate
</button>

</div>

<h1 class="text-xl font-bold text-center mt-2">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a id="waBtn"
class="btn flex items-center justify-center gap-2 bg-green-500 text-white py-3 rounded-full font-semibold">
<i data-lucide="message-circle"></i>
Chat via WhatsApp
</a>

<!-- LINKS ATAS -->
<div id="links" class="space-y-2"></div>

<!-- PRODUCTS -->
<div id="products" class="flex gap-3 overflow-x-auto py-2"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom" class="space-y-2"></div>

<!-- FOOTER -->
<div class="flex justify-center gap-6 text-gray-500 pt-2">
<i data-lucide="instagram"></i>
<i data-lucide="linkedin"></i>
<i data-lucide="github"></i>
<i data-lucide="pen-tool"></i>
<i data-lucide="share-2"></i>
</div>

</div>

<!-- QRIS -->
<div id="qrisPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="card p-4 relative w-72">

<div class="mac absolute top-3 left-3">
<span class="r"></span>
<span class="y"></span>
<span class="g"></span>
</div>

<button onclick="closeQRIS()"
class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<img src="/assets/qris.webp" alt="QRIS Pembayaran" class="w-full mt-4">

</div>
</div>

<!-- PRODUCT POPUP -->
<div id="productPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div id="modalBox"
class="card p-4 w-80 relative modal">

<div class="mac absolute top-3 left-3">
<span class="r"></span>
<span class="y"></span>
<span class="g"></span>
</div>

<button onclick="closeProduct()"
class="absolute top-3 right-3">
<i data-lucide="x"></i>
</button>

<img id="pMain" alt="Detail Produk"
class="w-full h-48 object-cover rounded-xl mt-3">

<div id="thumbs"
class="flex gap-2 mt-2 overflow-x-auto"></div>

<h3 id="pTitle" class="font-bold mt-2"></h3>
<p id="pPrice" class="text-gray-600"></p>
<p id="pDesc" class="text-sm mt-1"></p>

<div class="flex gap-2 mt-3">
<a id="pInfo"
class="flex-1 border py-2 rounded-xl text-center">Info</a>

<a id="pBuy"
class="flex-1 bg-black text-white py-2 rounded-xl text-center">Beli</a>
</div>

</div>
</div>

<script src="/script.js"></script>
<script>lucide.createIcons()</script>

</body>
</html>

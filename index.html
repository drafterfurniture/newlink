<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anto | Link in Bio</title>
<meta name="description" content="All my links, products, and portfolio" />

<!-- Open Graph -->
<meta property="og:title" content="Anto | Link in Bio" />
<meta property="og:description" content="All my links, products, and portfolio" />
<meta property="og:image" content="/assets/og.png" />

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<link rel="manifest" href="/manifest.json" />

<style>
body {font-family: system-ui, sans-serif;}
.fade-in {animation: fade 0.6s ease-in;}
@keyframes fade {from{opacity:0;transform:translateY(10px);}to{opacity:1;}}
</style>
</head>

<body class="bg-neutral-100 text-neutral-900">

<div class="max-w-md mx-auto p-4">

<!-- Profile -->
<div class="text-center fade-in">
<img src="/assets/profile.jpg" class="w-24 h-24 rounded-full mx-auto mb-3" loading="lazy">
<h1 class="text-xl font-bold">Anto</h1>
<p class="text-sm text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- Featured Link -->
<div id="featured" class="mt-4"></div>

<!-- Links -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- Products -->
<div id="products" class="mt-6"></div>

<!-- Gallery -->
<div id="gallery" class="grid grid-cols-2 gap-2 mt-6"></div>

<!-- Social -->
<div id="social" class="flex justify-center gap-4 mt-6"></div>

</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
<div class="bg-white p-4 rounded-xl max-w-sm w-full">
<img id="modalImg" class="rounded-lg mb-2" />
<h2 id="modalTitle" class="font-bold"></h2>
<p id="modalDesc" class="text-sm"></p>
<a id="modalBuy" class="block mt-3 bg-black text-white p-2 rounded text-center">Buy</a>
<button onclick="closeModal()" class="mt-2 text-sm">Close</button>
</div>
</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body { font-family: system-ui, sans-serif; }
</style>

</head>

<body class="bg-gray-100 flex justify-center">

<div class="w-full max-w-md min-h-screen p-4">

<!-- ================= HEADER ================= -->
<div class="bg-white p-3 rounded-3xl shadow-sm">

  <div class="relative h-32 rounded-2xl overflow-hidden bg-gradient-to-br from-sky-100 via-sky-200 to-blue-300">
    <div id="lottie-cover" class="absolute inset-0 flex items-center justify-center"></div>
  </div>

  <div class="relative -mt-10 flex items-center justify-between px-2">

    <div class="bg-white p-[4px] rounded-full shadow-lg">
      <img src="/assets/avatar.jpg" class="w-16 h-16 rounded-full object-cover"/>
    </div>

    <button onclick="openQR()" class="bg-white px-4 py-2 rounded-full shadow-md flex items-center gap-2">
      <i data-lucide="heart" class="w-4 h-4"></i>
      Donate
    </button>

  </div>

  <div class="mt-3 text-center">
    <h1 class="text-lg font-bold">Customin Store</h1>
    <p class="text-sm text-gray-500">Builder • Auto Cuan</p>
  </div>

</div>

<!-- ================= LINKS ================= -->
<div class="mt-6 space-y-3">

  <a href="https://wa.me/628xxxx"
     class="bg-black text-white text-center py-3 rounded-xl font-semibold block">
    🔥 Chat via WhatsApp
  </a>

  <a href="#" class="bg-white py-3 px-4 rounded-xl flex justify-between shadow-sm">
    <span>🔥 Chat via WhatsApp</span>
    <i data-lucide="arrow-right"></i>
  </a>

  <a href="#" class="bg-white py-3 px-4 rounded-xl flex justify-between shadow-sm">
    <span>Portfolio</span>
    <i data-lucide="arrow-right"></i>
  </a>

  <a href="#" class="bg-white py-3 px-4 rounded-xl flex justify-between shadow-sm">
    <span>Affiliate Tools</span>
    <i data-lucide="arrow-right"></i>
  </a>

</div>

<!-- ================= PRODUCT ================= -->
<div class="mt-6 overflow-hidden">

  <div id="slider" class="flex gap-3 overflow-x-auto">

    <!-- ITEM -->
    <div onclick="openProduct(0)" class="min-w-[48%] aspect-square rounded-2xl overflow-hidden relative shadow cursor-pointer">
      <img src="/assets/avatar.jpg" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
      <div class="absolute bottom-3 left-3 text-white">
        <h3 class="font-semibold text-sm">Template Link Bio</h3>
        <p class="text-xs opacity-80">Rp99.000</p>
      </div>
    </div>

    <div onclick="openProduct(1)" class="min-w-[48%] aspect-square rounded-2xl overflow-hidden relative shadow cursor-pointer">
      <img src="/assets/avatar.jpg" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
      <div class="absolute bottom-3 left-3 text-white">
        <h3 class="font-semibold text-sm">UI Kit Premium</h3>
        <p class="text-xs opacity-80">Rp149.000</p>
      </div>
    </div>

  </div>

</div>

<!-- ================= LINK BAWAH ================= -->
<div class="mt-4">
  <a href="#" class="bg-white py-3 px-4 rounded-xl flex justify-between shadow-sm">
    <span>Lihat Semua Produk</span>
    <i data-lucide="arrow-right"></i>
  </a>
</div>

<!-- ================= FOOTER ================= -->
<div class="mt-8 flex justify-center gap-4 text-gray-600">
  <a href="#"><i data-lucide="instagram"></i></a>
  <a href="#"><i data-lucide="send"></i></a>
  <a href="#"><i data-lucide="figma"></i></a>
  <a href="#"><i data-lucide="linkedin"></i></a>
  <a href="#"><i data-lucide="github"></i></a>
  <a href="#"><i data-lucide="image"></i></a>
</div>

</div>

<!-- ================= PRODUCT MODAL ================= -->
<div id="productModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">

  <div class="bg-white rounded-2xl p-4 w-[90%] max-w-sm relative">

    <div class="absolute top-3 right-3 flex gap-1">
      <div onclick="closeProduct()" class="w-3 h-3 bg-red-500 rounded-full"></div>
      <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
      <div class="w-3 h-3 bg-green-500 rounded-full"></div>
    </div>

    <img id="mainImg" class="rounded-xl mb-3">

    <div id="thumbs" class="flex gap-2 mb-3"></div>

    <h2 id="pTitle" class="font-bold"></h2>
    <p id="pPrice" class="text-sm text-gray-500 mb-2"></p>
    <p id="pDesc" class="text-sm mb-3"></p>

    <div class="flex gap-2">
      <a id="pInfo" class="flex-1 bg-gray-200 py-2 text-center rounded">Info</a>
      <a id="pBuy" class="flex-1 bg-black text-white py-2 text-center rounded">Beli</a>
    </div>

  </div>

</div>

<!-- ================= QR ================= -->
<div id="popupQR" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

  <div class="bg-white p-4 rounded-2xl w-80 relative">

    <button onclick="closeQR()" class="absolute top-3 right-3">✕</button>

    <img src="/assets/qris.webp" class="rounded-xl">

  </div>

</div>

<script>
lucide.createIcons();

/* LOTTIE */
lottie.loadAnimation({
  container: document.getElementById('lottie-cover'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: '/assets/cover.json',
  rendererSettings: {
    preserveAspectRatio: 'xMidYMid meet'
  }
});

/* AUTO SLIDE */
const slider = document.getElementById("slider");

setInterval(()=>{
  slider.scrollBy({ left: 200, behavior: "smooth" });

  if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 5){
    slider.scrollTo({ left: 0, behavior: "smooth" });
  }
}, 2500);

/* DATA */
const products = [
  {
    title:"Template Link Bio",
    price:"Rp99.000",
    desc:"Template siap jual + responsive",
    images:["/assets/avatar.jpg","/assets/avatar.jpg"],
    info:"#",
    buy:"https://wa.me/628xxxx"
  },
  {
    title:"UI Kit Premium",
    price:"Rp149.000",
    desc:"UI modern siap pakai",
    images:["/assets/avatar.jpg","/assets/avatar.jpg"],
    info:"#",
    buy:"#"
  }
];

/* PRODUCT MODAL */
function openProduct(i){
  const p = products[i];

  productModal.classList.remove("hidden");
  productModal.classList.add("flex");

  mainImg.src = p.images[0];
  pTitle.innerText = p.title;
  pPrice.innerText = p.price;
  pDesc.innerText = p.desc;
  pInfo.href = p.info;
  pBuy.href = p.buy;

  thumbs.innerHTML = "";
  p.images.forEach(img=>{
    const el = document.createElement("img");
    el.src = img;
    el.className="w-14 h-14 rounded cursor-pointer border";
    el.onclick = ()=> mainImg.src = img;
    thumbs.appendChild(el);
  });
}

function closeProduct(){
  productModal.classList.add("hidden");
}

/* QR */
function openQR(){
  popupQR.classList.remove("hidden");
  popupQR.classList.add("flex");
}
function closeQR(){
  popupQR.classList.add("hidden");
}
</script>

</body>
</html>

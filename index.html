<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anto</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
 font-family:system-ui;
 background:linear-gradient(#f8fafc,#eef2ff);
}

/* HEADER */
.header{
 background:url('/assets/header.jpg') center/cover;
}

/* BUTTON */
.btn{
 height:54px;
 border-radius:16px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 16px;
 background:white;
}

/* WA */
.wa{
 background:linear-gradient(135deg,#22c55e,#4ade80);
 color:white;
}

/* NAV */
.nav{
 position:fixed;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
 width:94%;
 max-width:420px;
 display:flex;
 justify-content:space-around;
 padding:10px;
 border-radius:20px;
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(10px);
}

/* MAC CLOSE */
.mac{
 display:flex;
 gap:6px;
}
.dot{
 width:10px;
 height:10px;
 border-radius:999px;
}
.red{background:#ff5f57}
.yellow{background:#ffbd2e}
.green{background:#28c840}

/* CART BADGE */
.badge{
 position:absolute;
 top:-4px;
 right:-6px;
 background:red;
 color:white;
 font-size:10px;
 padding:2px 6px;
 border-radius:999px;
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4 pb-28">

<!-- HEADER -->
<div class="relative">
  <div class="header h-44 rounded-2xl"></div>

  <div class="absolute left-5 -bottom-10 z-20 flex justify-between w-[calc(100%-40px)]">

    <!-- AVATAR -->
    <img src="/assets/profile.jpg"
     class="w-20 h-20 rounded-full border-4 border-white shadow">

    <!-- DONATE -->
    <button onclick="openDonate()" class="bg-white px-4 py-2 rounded-full shadow flex items-center gap-2">
      <i data-lucide="heart"></i>
      Donate
    </button>

  </div>
</div>

<div class="h-16"></div>

<!-- NAME -->
<div class="text-center">
 <h1 class="font-semibold text-lg">Anto</h1>
 <p class="text-sm text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 gap-3 mt-6"></div>

<!-- BLOG -->
<div id="blog" class="space-y-3 mt-6"></div>

</div>

<!-- DONATE MODAL -->
<div id="donateModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
 <div class="bg-white p-4 rounded-xl w-[90%] max-w-sm">

   <div class="flex justify-between items-center mb-2">
     <div class="mac">
       <div class="dot red"></div>
       <div class="dot yellow"></div>
       <div class="dot green"></div>
     </div>
     <button onclick="closeDonate()">✕</button>
   </div>

   <img src="/assets/qris.webp" class="rounded-lg">
 </div>
</div>

<!-- PRODUCT MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
 <div class="bg-white p-4 rounded-xl w-[90%] max-w-sm">

   <div class="flex justify-between items-center mb-2">
     <div class="mac">
       <div class="dot red"></div>
       <div class="dot yellow"></div>
       <div class="dot green"></div>
     </div>
     <button onclick="closeModal()">✕</button>
   </div>

   <h2 id="mTitle"></h2>
   <img id="mImg" class="rounded-lg my-2">
   <p id="mPrice"></p>

   <div class="flex gap-2 mt-4">
     <button class="flex-1 border rounded-lg p-2">Demo</button>
     <button onclick="addCartModal()" class="flex-1 bg-green-500 text-white rounded-lg p-2">Add to Cart</button>
   </div>
 </div>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
 <div class="bg-white p-4 rounded-xl w-[90%] max-w-sm">

   <div class="flex justify-between mb-2">
     <div class="mac">
       <div class="dot red"></div>
       <div class="dot yellow"></div>
       <div class="dot green"></div>
     </div>
     <button onclick="closeCart()">✕</button>
   </div>

   <h2 class="font-semibold">Cart</h2>
   <div id="cartList" class="text-sm mt-2"></div>

   <button onclick="checkout()" class="w-full mt-4 bg-green-500 text-white p-2 rounded-lg">
     Checkout WhatsApp
   </button>
 </div>
</div>

<!-- NAV -->
<div class="nav">

  <a><i data-lucide="instagram"></i></a>
  <a><i data-lucide="at-sign"></i></a>
  <a><i data-lucide="linkedin"></i></a>
  <a><i data-lucide="briefcase"></i></a>
  <a><i data-lucide="pin"></i></a>

  <a onclick="openCart()" class="relative">
    <i data-lucide="shopping-cart"></i>
    <span id="cartCount" class="badge hidden">0</span>
  </a>

</div>

<script src="/script.js"></script>
</body>
</html>

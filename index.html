<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anto | Link in Bio</title>
<meta name="description" content="All my links, products, and portfolio" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{font-family:system-ui;background:#f5f5f5}
.gradient{background:linear-gradient(120deg,#ff7a18,#ff3cac,#784ba0,#2b86c5);background-size:300% 300%;animation:grad 8s ease infinite}
@keyframes grad{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.social{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:9999px;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.08);transition:.25s}
.social:hover{transform:translateY(-3px) scale(1.08)}
.social i{animation:pulse 2.5s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="relative rounded-3xl overflow-hidden shadow-lg bg-white">
  <div class="h-32">
    <img src="/assets/cover.jpg" class="w-full h-full object-cover">
  </div>

  <div class="absolute left-1/2 -bottom-10 -translate-x-1/2 flex flex-col items-center gap-3">
    <img src="/assets/profile.jpg" class="w-20 h-20 rounded-full border-4 border-white shadow-lg object-cover">

    <div class="flex gap-3">
      <a href="#" class="social"><i data-lucide="github"></i></a>
      <a href="#" class="social linkedin"><i data-lucide="linkedin"></i></a>
      <a href="#" class="social instagram"><i data-lucide="instagram"></i></a>
      <a href="#" class="social threads"><i data-lucide="message-circle"></i></a>
    </div>
  </div>
</div>

<div class="h-16"></div>

<div class="text-center">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- COUNTDOWN -->
<div id="countdown" class="text-center text-sm text-red-500 mt-2"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-6"></div>

</div>

<script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="icon" href="/assets/favicon.png">
<link rel="canonical" href="https://drafterfurniture.com">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<!-- LOTTIE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #fff;
}

/* IOS CARD */
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border: 1px solid #eee;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}

/* BUTTON */
.btn {
  transition: all .25s ease;
}
.btn:active {
  transform: scale(0.96);
}

/* SMOOTH SCROLL */
::-webkit-scrollbar { display:none }
</style>

</head>

<body>

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="card p-3">

<div id="coverBox"
class="h-36 rounded-2xl overflow-hidden flex items-center justify-center bg-gradient-to-r from-blue-300 to-blue-500">
</div>

<div class="flex justify-between items-center -mt-10 px-2">

<img src="/assets/avatar.jpg"
class="w-20 h-20 rounded-full border-4 border-white object-cover shadow"
alt="avatar">

<button onclick="openQRIS()"
class="btn bg-white/80 backdrop-blur px-4 py-2 rounded-full shadow flex items-center gap-2">
<i data-lucide="heart"></i> Donate
</button>

</div>

<h1 class="text-xl font-bold text-center mt-2">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a id="waBtn"
class="btn block bg-black text-white py-3 rounded-full text-center font-semibold">
🔥 Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="space-y-2"></div>

<!-- PRODUCTS -->
<div id="products"
class="flex gap-3 overflow-x-auto py-2"></div>

<!-- BUTTON BAWAH (DIFFERENT STYLE) -->
<a href="#"
class="btn block border border-black text-black py-3 rounded-full text-center font-semibold">
Explore Produk →
</a>

<!-- FOOTER -->
<div class="flex justify-center gap-6 text-gray-500 pt-2">
<i data-lucide="instagram"></i>
<i data-lucide="linkedin"></i>
<i data-lucide="github"></i>
<i data-lucide="pen-tool"></i>
<i data-lucide="share-2"></i>
</div>

</div>

<!-- QRIS -->
<div id="qrisPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="card p-4 relative">
<button onclick="closeQRIS()" class="absolute top-2 right-2">✖</button>
<img src="/assets/qris.webp" class="w-60">
</div>

</div>

<!-- PRODUCT POPUP -->
<div id="productPopup"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center backdrop-blur">

<div class="card p-4 w-80 relative animate-[fade_.2s]">

<button onclick="closeProduct()" class="absolute top-2 right-2">✖</button>

<img id="pMain"
class="w-full h-48 object-cover rounded-xl">

<div id="thumbs"
class="flex gap-2 mt-2 overflow-x-auto"></div>

<h3 id="pTitle" class="font-bold mt-2"></h3>
<p id="pPrice" class="text-gray-600"></p>
<p id="pDesc" class="text-sm mt-1"></p>

<div class="flex gap-2 mt-3">
<a id="pInfo"
class="flex-1 border py-2 rounded-xl text-center">Info</a>

<a id="pBuy"
class="flex-1 bg-black text-white py-2 rounded-xl text-center">Beli</a>
</div>

</div>
</div>

<script src="/script.js"></script>
<script>lucide.createIcons()</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customin Store</title>
<meta name="description" content="Template link bio premium siap jual">

<link rel="canonical" href="https://drafterfurniture.com">
<link rel="icon" href="/assets/favicon.png">
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ffffff">

<!-- CRITICAL -->
<style>
body{font-family:-apple-system;background:#fff}
</style>

<!-- TAILWIND NON BLOCK -->
<script>
tailwind={theme:{extend:{}}}
const s=document.createElement("script")
s.src="https://cdn.tailwindcss.com"
s.defer=true
document.head.appendChild(s)
</script>

<!-- LOTTIE -->
<script defer src="/assets/lottie.min.js"></script>

</head>

<body>

<main class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="bg-white/90 backdrop-blur border rounded-2xl p-3">

<div id="coverBox"
class="h-36 rounded-xl overflow-hidden flex items-center justify-center
bg-gradient-to-r from-blue-200 to-blue-400"></div>

<div class="flex justify-between items-center -mt-10 px-2">

<img src="/assets/avatar.jpg" loading="lazy"
class="w-20 h-20 rounded-full border-4 border-white object-cover">

<button onclick="openQRIS()"
class="bg-white px-4 py-2 rounded-full flex items-center gap-2 border">

<!-- ICON -->
<svg width="18" height="18" stroke="currentColor" fill="none">
<path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3 12 7 12 7s1.5-4 4.5-4S21 6.5 21 12.5 12 21 12 21z"/>
</svg>

Donate
</button>

</div>

<h1 class="text-xl font-bold text-center mt-2">Customin Store</h1>
<p class="text-gray-500 text-center text-sm">Builder • Auto Cuan</p>

</div>

<!-- CTA -->
<a id="waBtn"
class="flex items-center justify-center gap-2 bg-green-500 text-white py-3 rounded-full font-semibold">

<svg width="18" height="18" stroke="currentColor" fill="none">
<path d="M21 11.5a8.5 8.5 0 1 1-4.3-7.4L21 3l-1.1 4.3A8.5 8.5 0 0 1 21 11.5z"/>
</svg>

Chat via WhatsApp
</a>

<!-- LINKS -->
<div id="links" class="space-y-2"></div>

<!-- PRODUCTS -->
<div id="products" class="flex gap-3 overflow-x-auto py-2"></div>

<!-- LINKS BAWAH -->
<div id="linksBottom" class="space-y-2"></div>

</main>

<!-- SCRIPT -->
<script>

// DATA INLINE (NO FETCH)
const d={
links:[
{title:"Chat WhatsApp",url:"#"},
{title:"Portfolio",url:"#"}
],
linksBottom:[
{title:"Artikel",url:"#"}
],
products:[
{
title:"Template Link Bio",
price:"99000",
desc:"Siap jual",
buy:"#",
images:["/assets/p1.jpg","/assets/p2.jpg"]
}
]
}

// RENDER LINKS
d.links.forEach(l=>{
links.innerHTML+=`
<a href="${l.url}"
class="bg-white border rounded-xl p-3 flex justify-between">
${l.title} →
</a>`
})

// PRODUCTS
d.products.forEach(p=>{
products.innerHTML+=`
<div onclick='alert("${p.title}")'
class="min-w-[45%] bg-white border rounded-xl p-2">

<img src="${p.images[0]}" loading="lazy"
class="w-full aspect-square object-cover rounded-xl">

<h2 class="text-sm font-semibold mt-1">${p.title}</h2>
<p class="text-xs text-gray-500">Rp${p.price}</p>

</div>`
})

// LINKS BAWAH
d.linksBottom.forEach(l=>{
linksBottom.innerHTML+=`
<a href="${l.url}"
class="bg-white border rounded-xl p-3 flex justify-between">
${l.title} →
</a>`
})

// WA
waBtn.href="https://wa.me/628xxxx"

// LOTTIE (IDLE LOAD)
window.addEventListener("load",()=>{
requestIdleCallback(()=>{
lottie.loadAnimation({
container:document.getElementById("coverBox"),
renderer:"svg",
loop:true,
autoplay:true,
path:"/assets/cover.json"
})
})
})

</script>

</body>
</html>

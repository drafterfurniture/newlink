<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Anto | Link in Bio</title>
<meta name="description" content="All my links, products, and portfolio" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body{font-family:system-ui;background:#f5f5f5}

/* ORANGE BACKGROUND */
#lottie-cover{
  background: linear-gradient(135deg,#ff7a18,#ff9a3c,#ffb347);
}

/* BUTTON HOVER */
.link,.product{transition:.25s}
.link:hover{transform:translateY(-2px) scale(1.02)}
.product:hover{transform:translateY(-3px) scale(1.02)}

/* DONATE ICON ANIMATION */
.lucide-heart{
 animation: pulse 1.5s infinite;
}
@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.2)}
 100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="relative">
  <div class="rounded-[30px] overflow-hidden bg-white shadow-[0_10px_30px_rgba(0,0,0,0.08)]">
    <div class="relative h-44 w-full">
      <div id="lottie-cover" class="w-full h-full"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent"></div>
    </div>
  </div>

  <!-- AVATAR + DONATE -->
  <div class="absolute left-5 -bottom-8 flex items-center gap-3">

    <!-- Avatar -->
    <div class="relative">
      <div class="absolute inset-0 rounded-full blur-md bg-black/10"></div>
      <div class="relative w-[78px] h-[78px] rounded-full border-[4px] border-white bg-white overflow-hidden shadow-md">
        <img src="/assets/profile.jpg" class="w-full h-full object-cover">
      </div>
    </div>

    <!-- Donate -->
    <button onclick="openDonate()" class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow text-sm font-medium hover:scale-105 transition">
      <i data-lucide="heart"></i>
      <span>Donate</span>
    </button>

  </div>
</div>

<div class="h-20"></div>

<!-- NAME -->
<div class="text-center">
  <h1 class="font-bold text-lg">Anto</h1>
  <p class="text-xs text-gray-500">Builder • SaaS • Furniture</p>
</div>

<!-- FEATURED -->
<div id="featured" class="mt-4"></div>

<!-- COUNTDOWN -->
<div id="countdown" class="text-center text-sm text-red-500 mt-2"></div>

<!-- LINKS -->
<div id="links" class="space-y-3 mt-4"></div>

<!-- PRODUCTS -->
<div id="products" class="mt-6"></div>

</div>

<!-- DONATE MODAL -->
<div id="donateModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-4 w-[90%] max-w-sm relative">

    <!-- Close -->
    <button onclick="closeDonate()" class="absolute top-3 right-3 w-6 h-6 rounded-full bg-red-500 text-white text-xs flex items-center justify-center">
      ✕
    </button>

    <h2 class="text-center font-bold mb-3">Support / Donate</h2>

    <img src="/assets/qris.png" class="rounded-lg w-full" />

    <p class="text-xs text-center text-gray-500 mt-2">
      Scan QRIS untuk donasi 🙏
    </p>

  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
